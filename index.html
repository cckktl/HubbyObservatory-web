<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="老公觀測站 — Gamify your marriage. Track harmony XP, log crimes, and rank your husband from Menace to Saint.">
  <title>老公觀測站 — Hubby Observatory</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="assets/icon.png">
  <style>
    /* ---- HERO ---- */
    .hero {
      border-bottom: var(--border);
      padding: 64px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 40px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .hero-left { flex: 1; max-width: 480px; }

    .hero-eyebrow {
      font-family: monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent-cyan);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
      text-shadow: 0 0 10px rgba(0, 209, 255, 0.4);
    }

    .hero h1 {
      font-family: monospace;
      font-size: 42px;
      font-weight: 900;
      color: var(--text-primary);
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .hero-subtitle {
      font-family: monospace;
      font-size: 16px;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    .hero-body {
      font-size: 15px;
      color: var(--text-tertiary);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .appstore-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--text-primary);
      color: var(--white);
      border-radius: 10px;
      padding: 14px 28px;
      font-family: monospace;
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 4px 4px 0 var(--accent-cyan);
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .appstore-btn:hover {
      transform: translate(-1px, -1px);
      box-shadow: 5px 5px 0 var(--accent-cyan);
    }

    .hero-right {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .screenshot {
      border-radius: 16px;
      border: var(--border);
      overflow: hidden;
      box-shadow: var(--pixel-shadow);
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-family: monospace;
      text-align: center;
      padding: 8px;
      color: #ccc;
    }

    .ss-tall  { width: 110px; height: 200px; }
    .ss-short { width: 100px; height: 174px; }

    /* ---- FEATURES ---- */
    .features-section {
      background: var(--white);
      border-top: var(--border);
      border-bottom: var(--border);
      padding: 48px 40px;
    }

    .features-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-label {
      font-family: monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent-cyan);
      text-transform: uppercase;
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 28px;
      text-shadow: 0 0 10px rgba(0, 209, 255, 0.4);
    }

    .feat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .feat-card {
      background: var(--bg-gradient-start);
      border: var(--border);
      border-radius: var(--radius);
      padding: 20px 16px;
      text-align: center;
      box-shadow: var(--pixel-shadow);
    }

    .feat-icon { font-size: 28px; margin-bottom: 10px; }

    .feat-name {
      font-family: monospace;
      font-size: 13px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .feat-desc {
      font-size: 12px;
      color: var(--text-tertiary);
      line-height: 1.5;
    }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 768px) {
      .hero {
        flex-direction: column;
        padding: 40px 20px;
        text-align: center;
      }
      .hero-left { max-width: 100%; }
      .hero h1 { font-size: 30px; }
      .hero-right {
        justify-content: center;
        overflow-x: auto;
        width: 100%;
      }
      .feat-grid { grid-template-columns: 1fr 1fr; }
      .features-section { padding: 32px 20px; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="site-nav">
    <a class="nav-logo" href="/">
      <img src="assets/icon.png" alt="Hubby Observatory icon">
      <span data-i18n="appName">老公觀測站</span>
    </a>
    <div class="nav-right">
      <button class="lang-btn" onclick="toggleLang()" id="langBtn">EN</button>
      <a class="nav-dl-btn" href="#download" data-i18n="cta">在 App Store 下載</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-left">
      <div class="hero-eyebrow" data-i18n="eyebrow">★ 讓婚姻變成遊戲 ★</div>
      <h1 data-i18n="appName">老公觀測站</h1>
      <div class="hero-subtitle" data-i18n="appNameEn">Hubby Observatory</div>
      <p class="hero-body" data-i18n="heroBody">即時追蹤老公的和諧值。犯罪紀錄、如廁計時、7級排名，全都在這裡。</p>
      <a class="appstore-btn" href="#" id="download" data-i18n="cta">在 App Store 下載</a>
    </div>
    <!-- TODO: Replace ss1.png, ss2.png, ss3.png with real App Store screenshots -->
    <div class="hero-right">
      <img class="screenshot ss-short" src="assets/ss1.png" alt="Hubby Observatory — main screen" onerror="this.style.display='none'">
      <img class="screenshot ss-tall"  src="assets/ss2.png" alt="Hubby Observatory — poop timer" onerror="this.style.display='none'">
      <img class="screenshot ss-short" src="assets/ss3.png" alt="Hubby Observatory — weekly report" onerror="this.style.display='none'">
    </div>
  </section>

  <!-- FEATURES -->
  <section class="features-section">
    <div class="features-inner">
      <div class="section-label" data-i18n="featuresLabel">★ Features ★</div>
      <div class="feat-grid">
        <div class="feat-card">
          <div class="feat-icon">💣</div>
          <div class="feat-name" data-i18n="feat1Name">犯罪紀錄</div>
          <div class="feat-desc" data-i18n="feat1Desc">即時記錄扣分事件</div>
        </div>
        <div class="feat-card">
          <div class="feat-icon">🚽</div>
          <div class="feat-name" data-i18n="feat2Name">如廁計時器</div>
          <div class="feat-desc" data-i18n="feat2Desc">按等級自動扣分</div>
        </div>
        <div class="feat-card">
          <div class="feat-icon">🏆</div>
          <div class="feat-name" data-i18n="feat3Name">7級和諧排名</div>
          <div class="feat-desc" data-i18n="feat3Desc">從禍害到聖人</div>
        </div>
        <div class="feat-card">
          <div class="feat-icon">📊</div>
          <div class="feat-name" data-i18n="feat4Name">每週報告</div>
          <div class="feat-desc" data-i18n="feat4Desc">詳細和諧值分析</div>
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="site-footer">
    <span class="copy" data-i18n="footer">© 2026 老公觀測站</span>
    <div class="footer-links">
      <a href="privacy.html" data-i18n="privacyLink">隱私政策</a>
      <a href="terms.html" data-i18n="termsLink">使用條款</a>
    </div>
  </footer>

  <script>
    const i18n = {
      zh: {
        appName:       "老公觀測站",
        appNameEn:     "Hubby Observatory",
        eyebrow:       "★ 讓婚姻變成遊戲 ★",
        heroBody:      "即時追蹤老公的和諧值。犯罪紀錄、如廁計時、7級排名，全都在這裡。",
        cta:           "在 App Store 下載",
        featuresLabel: "★ Features ★",
        feat1Name:     "犯罪紀錄",
        feat1Desc:     "即時記錄扣分事件",
        feat2Name:     "如廁計時器",
        feat2Desc:     "按等級自動扣分",
        feat3Name:     "7級和諧排名",
        feat3Desc:     "從禍害到聖人",
        feat4Name:     "每週報告",
        feat4Desc:     "詳細和諧值分析",
        footer:        "© 2026 老公觀測站",
        privacyLink:   "隱私政策",
        termsLink:     "使用條款",
      },
      en: {
        appName:       "Hubby Observatory",
        appNameEn:     "老公觀測站",
        eyebrow:       "★ Gamify your marriage ★",
        heroBody:      "Track your husband's harmony XP in real time. Crimes, timers, ranks — all in one retro-style app.",
        cta:           "Download on App Store",
        featuresLabel: "★ Features ★",
        feat1Name:     "Crime Log",
        feat1Desc:     "Record infractions and dock XP instantly",
        feat2Name:     "Poop Timer",
        feat2Desc:     "Bathroom time tracked and penalized by tier",
        feat3Name:     "7 Harmony Ranks",
        feat3Desc:     "From Menace 💣 to Saint 🙇‍♂️",
        feat4Name:     "Weekly Reports",
        feat4Desc:     "Detailed XP breakdowns every week",
        footer:        "© 2026 Hubby Observatory",
        privacyLink:   "Privacy Policy",
        termsLink:     "Terms of Use",
      }
    };

    let lang = "zh";

    function setLang(l) {
      lang = l;
      document.documentElement.lang = l === "zh" ? "zh-Hant" : "en";
      document.getElementById("langBtn").textContent = l === "zh" ? "EN" : "中文";
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.dataset.i18n;
        if (i18n[l][key] !== undefined) el.textContent = i18n[l][key];
      });
    }

    function toggleLang() {
      setLang(lang === "zh" ? "en" : "zh");
    }
  </script>

</body>
</html>
